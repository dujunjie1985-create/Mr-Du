<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>厨房看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'PingFang SC', sans-serif; background:#0d1117; color:#fff; min-height:100vh; }
.header { background:#161b22; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #e94560; position:sticky; top:0; z-index:50; }
.header h1 { font-size:17px; color:#e94560; }
.header-right { display:flex; align-items:center; gap:10px; }
.clock { font-size:13px; color:#888; }
.history-btn { padding:6px 12px; background:#333; color:#fff; border:none; border-radius:8px; font-size:13px; cursor:pointer; }
.back-btn { font-size:20px; cursor:pointer; color:#888; }
.columns { display:grid; grid-template-columns:1fr 1fr; height:calc(100vh - 52px); }
.col { border-right:1px solid #21262d; overflow-y:auto; }
.col-header { padding:10px 12px; font-size:13px; font-weight:bold; text-align:center; position:sticky; top:0; z-index:10; }
.col-starters .col-header { background:#1a2e1a; color:#2ecc71; border-bottom:2px solid #2ecc71; }
.col-mains .col-header { background:#2e1a1a; color:#e94560; border-bottom:2px solid #e94560; }
.order-card { margin:6px; border-radius:10px; padding:10px 12px; border:1px solid #333; background:#161b22; animation:slideIn 0.3s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.table-badge { background:#e94560; color:#fff; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:bold; }
.time-badge { font-size:11px; color:#888; }
.timer-bar { height:3px; background:#21262d; border-radius:2px; margin-bottom:6px; overflow:hidden; }
.timer-fill { height:100%; border-radius:2px; transition:width 1s linear; }
.order-item { display:flex; align-items:flex-start; padding:5px 0; border-bottom:1px solid #21262d; gap:8px; font-size:13px; }
.order-item:last-child { border-bottom:none; }
.item-qty { background:#e94560; color:#fff; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold; flex-shrink:0; margin-top:2px; }
.item-name { flex:1; }
.item-name-de { font-size:11px; color:#aaa; }
.item-note { font-size:11px; color:#f5a623; margin-top:2px; }
.card-actions { display:flex; gap:6px; margin-top:8px; }
.done-btn { flex:1; padding:8px; background:linear-gradient(135deg,#27ae60,#1e8449); color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:bold; cursor:pointer; }
.urgent-btn { padding:8px 10px; background:#f5a623; color:#fff; border:none; border-radius:8px; font-size:12px; cursor:pointer; }
.empty-msg { text-align:center; color:#444; padding:40px 12px; font-size:13px; }
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:200; overflow-y:auto; }
.modal.open { display:block; }
.modal-content { background:#161b22; margin:16px; border-radius:16px; padding:16px; }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.modal-title { font-size:16px; font-weight:bold; color:#f5a623; }
.modal-close { font-size:22px; cursor:pointer; color:#888; }
.history-item { background:#1a1a2e; border-radius:8px; padding:10px 12px; margin-bottom:8px; border-left:3px solid #27ae60; }
.toast { position:fixed; top:60px; left:50%; transform:translateX(-50%); color:#fff; padding:10px 20px; border-radius:10px; font-size:14px; font-weight:bold; display:none; z-index:999; white-space:nowrap; }
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="back-btn" onclick="location.href='/'">←</span>
    <h1>🍳 厨房 / Küche</h1>
  </div>
  <div class="header-right">
    <span class="clock" id="clock"></span>
    <button class="history-btn" onclick="openHistory()">📋 已出菜</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="columns">
  <div class="col col-starters">
    <div class="col-header">🥗 前菜 / Vorspeisen</div>
    <div id="starters-list"></div>
  </div>
  <div class="col col-mains">
    <div class="col-header">🍜 主食 / Hauptgerichte</div>
    <div id="mains-list"></div>
  </div>
</div>
<div class="modal" id="history-modal">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title">📋 已出菜记录</span>
      <span class="modal-close" onclick="closeHistory()">✕</span>
    </div>
    <div id="history-list"></div>
  </div>
</div>
<script>
const socket = io();
let pendingOrders = [];
let doneOrders = [];

function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('de-DE'); }
setInterval(updateClock, 1000); updateClock();

function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === 'new') {
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(880, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
      osc.start(); osc.stop(ctx.currentTime + 0.5);
    } else if (type === 'urgent') {
      [0,0.15,0.3].forEach(t => {
        const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.frequency.value = 1320;
        g2.gain.setValueAtTime(0.4, ctx.currentTime+t);
        g2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+t+0.1);
        o2.start(ctx.currentTime+t); o2.stop(ctx.currentTime+t+0.1);
      });
    }
  } catch(e) {}
}

function showToast(msg, color='#27ae60') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function getElapsed(createdAt) {
  const created = new Date(createdAt.replace(' ','T'));
  const elapsed = Math.floor((Date.now() - created.getTime()) / 1000);
  return { elapsed, text: `${Math.floor(elapsed/60)}:${(elapsed%60).toString().padStart(2,'0')}` };
}

function getTimerColor(elapsed) {
  if (elapsed < 300) return '#2ecc71';
  if (elapsed < 600) return '#f5a623';
  return '#e94560';
}

const STARTER_KEYWORDS = ['毛豆','黄瓜','妈妈','泡菜','裙带','味噌','东阴','炸豆腐','春卷','小笼','饺子','天妇罗','章鱼','炸鸡','照烧鸡','沙拉','edamame','cucumber','gurken','mama','kimchi','wakame','miso','tom yum','agedashi','spring roll','frühlings','meat bun','fleisch','gyoza','tempura','takoyaki','karaage','fried chicken','salat','suppe'];

const DRINKS_KEYWORDS = ['啤酒','葡萄酒','鸡尾酒','威士忌','咖啡','矿泉水','可乐','柠檬水','冰茶','清酒','伏特加','朗姆','龙舌兰','浓缩','卡布','拿铁','美式','红茶','绿茶','苏打','椰子汁','果汁','卡尔','柚子','芦荟','汤力','生啤','起泡','玫瑰','霞多丽','雷司令','威特','茨威格','spritzer','beer','wine','cocktail','whisky','coffee','soft','homemade','sake','espresso','latte','tee','tea','juice','wasser','soda','calpis','yuzuka','martini','negroni','gimlet','fashioned','tonic','campari','aperol','lillet'];

function isDrink(item) {
  if (item.category === 'drinks') return true;
  const n = (item.name + ' ' + (item.name_de||'')).toLowerCase();
  return DRINKS_KEYWORDS.some(k => n.includes(k));
}

function isStarter(item) {
  if (item.category === 'starters') return true;
  const n = (item.name + ' ' + (item.name_de||'')).toLowerCase();
  return STARTER_KEYWORDS.some(k => n.includes(k));
}

function renderOrders(orders) {
  const sL = document.getElementById('starters-list');
  const mL = document.getElementById('mains-list');
  sL.innerHTML = ''; mL.innerHTML = '';

  if (orders.length === 0) {
    sL.innerHTML = '<div class="empty-msg">✅ 暂无待出前菜<br>Keine Vorspeisen</div>';
    mL.innerHTML = '<div class="empty-msg">✅ 暂无待出主食<br>Keine Hauptgerichte</div>';
    return;
  }

  kitchenOrders = orders;
  kitchenOrders.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

  const byTable = {};
  kitchenOrders.forEach(o => {
    const items = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
    // 过滤掉酒水，保留所有其他菜品
    const foodItems = items.filter(i => !isDrink(i));
    if (foodItems.length === 0) return;
    if (!byTable[o.table_name]) byTable[o.table_name] = { ...o, starterItems:[], mainItems:[] };
    foodItems.forEach(item => {
      if (isStarter(item)) {
        const ex = byTable[o.table_name].starterItems.find(e => e.name === item.name);
        if (ex) ex.qty += item.qty; else byTable[o.table_name].starterItems.push({...item});
      } else {
        const ex = byTable[o.table_name].mainItems.find(e => e.name === item.name);
        if (ex) ex.qty += item.qty; else byTable[o.table_name].mainItems.push({...item});
      }
    });
  });

  let hasStarters = false, hasMains = false;

  Object.values(byTable).forEach(t => {
    const { elapsed, text } = getElapsed(t.created_at);
    const color = getTimerColor(elapsed);
    const pct = Math.min((elapsed/900)*100, 100);

    const makeCard = (items, container, cid) => {
      if (items.length === 0) return;
      const card = document.createElement('div');
      card.className = 'order-card';
      card.id = `card-${t.id}-${cid}`;
      const label = cid === 's' ? '前菜 / Vorspeisen' : '主食 / Hauptgerichte';
      card.innerHTML = `
        <div class="card-header">
          <span class="table-badge">🪑 ${t.table_name}</span>
          <span class="time-badge" id="tm-${t.id}-${cid}">${text}</span>
        </div>
        <div class="timer-bar"><div class="timer-fill" id="bar-${t.id}-${cid}" style="width:${pct}%;background:${color}"></div></div>
        <div>
          ${items.map(i => `
            <div class="order-item">
              <span class="item-qty">${i.qty}</span>
              <div class="item-name">
                <div>${i.name_de || i.name}</div>
                <div class="item-name-de">${i.name !== i.name_de ? i.name : ''}</div>
                ${i.note ? `<div class="item-note">📝 ${i.note}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
        <div class="card-actions">
          <button class="urgent-btn" onclick="urgentAlert('${t.table_name}')">⚡</button>
          <button class="done-btn" onclick="markDoneSection('${t.id}-${cid}','${t.table_name}','${cid}')">✅ ${cid==='s'?'前菜完成':'主食完成'} / Fertig</button>
        </div>
      `;
      container.appendChild(card);
    };

    if (t.starterItems.length > 0) { makeCard(t.starterItems, sL, 's'); hasStarters = true; }
    if (t.mainItems.length > 0) { makeCard(t.mainItems, mL, 'm'); hasMains = true; }
  });

  if (!hasStarters) sL.innerHTML = '<div class="empty-msg">✅ 暂无待出前菜<br>Keine Vorspeisen</div>';
  if (!hasMains) mL.innerHTML = '<div class="empty-msg">✅ 暂无待出主食<br>Keine Hauptgerichte</div>';
}

// 只消除该区域的卡片，不影响另一侧
function markDoneSection(cardId, tableName, cid) {
  const el = document.getElementById(`card-${cardId}`);
  if (el) {
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.3s';
    setTimeout(() => el.remove(), 300);
  }
  const label = cid === 's' ? '前菜' : '主食';
  showToast(`✅ ${tableName} ${label}已出！`, '#27ae60');
  doneOrders.unshift({ table: tableName, time: new Date().toLocaleTimeString('de-DE'), section: label });
}

async function markDone(orderId, tableName) {
  ['s','m'].forEach(cid => {
    const el = document.getElementById(`card-${orderId}-${cid}`);
    if (el) { el.style.opacity='0'; el.style.transition='opacity 0.3s'; setTimeout(()=>el.remove(),300); }
  });
  await fetch(`/api/order/${orderId}/complete`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({type:'kitchen'})
  });
  showToast(`✅ ${tableName} 全部已出！`, '#27ae60');
  doneOrders.unshift({ table: tableName, time: new Date().toLocaleTimeString('de-DE'), id: orderId });
  setTimeout(loadOrders, 500);
}

function urgentAlert(tableName) {
  playSound('urgent');
  showToast(`⚡ 加急：${tableName}！`, '#f5a623');
}

function openHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = doneOrders.length === 0
    ? '<div style="text-align:center;color:#444;padding:40px">暂无已出菜记录</div>'
    : doneOrders.map(o => `
        <div class="history-item">
          <div style="display:flex;justify-content:space-between;font-size:13px;">
            <span style="color:#27ae60;font-weight:bold;">🪑 ${o.table}</span>
            <span style="color:#888;">✅ ${o.time}</span>
          </div>
        </div>
      `).join('');
  document.getElementById('history-modal').classList.add('open');
}
function closeHistory() { document.getElementById('history-modal').classList.remove('open'); }

setInterval(() => {
  pendingOrders.forEach(o => {
    const { elapsed, text } = getElapsed(o.created_at);
    const color = getTimerColor(elapsed);
    const pct = Math.min((elapsed/900)*100, 100);
    ['s','m'].forEach(cid => {
      const tm = document.getElementById(`tm-${o.id}-${cid}`);
      const bar = document.getElementById(`bar-${o.id}-${cid}`);
      if (tm) tm.textContent = text;
      if (bar) { bar.style.width=pct+'%'; bar.style.background=color; }
    });
  });
}, 1000);

socket.on('new_order', data => { playSound('new'); showToast(`🆕 新订单：${data.table_name}`,'#4a90e2'); loadOrders(); });
socket.on('order_updated', loadOrders);

async function loadOrders() {
  const res = await fetch('/api/kitchen/orders');
  pendingOrders = await res.json();
  renderOrders(pendingOrders);
}

loadOrders();
setInterval(loadOrders, 30000);
</script>
</body>
</html>
