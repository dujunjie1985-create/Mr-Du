<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>厨房看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'PingFang SC', sans-serif; background:#0d1117; color:#fff; min-height:100vh; }

.header {
  background: #161b22;
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid #e94560;
}
.header h1 { font-size: 20px; color: #e94560; }
.back-btn { font-size: 22px; cursor: pointer; color: #888; }
.clock { font-size: 14px; color: #888; }

.columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  height: calc(100vh - 60px);
}

.col {
  border-right: 1px solid #21262d;
  overflow-y: auto;
}
.col-header {
  padding: 12px 16px;
  font-size: 14px;
  font-weight: bold;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 10;
}
.col-starters .col-header { background: #1e3a1e; color: #2ecc71; border-bottom: 2px solid #2ecc71; }
.col-mains .col-header { background: #3a1e1e; color: #e94560; border-bottom: 2px solid #e94560; }

.order-card {
  margin: 8px;
  border-radius: 10px;
  padding: 12px;
  border: 1px solid #333;
  background: #161b22;
}
.order-card.urgent { border-color: #f5a623; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{border-color:#f5a623} 50%{border-color:#fff} }

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.table-badge {
  background: #e94560;
  color: #fff;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: bold;
}
.time-badge {
  font-size: 12px;
  color: #888;
}
.timer-bar {
  height: 4px;
  background: #21262d;
  border-radius: 2px;
  margin-bottom: 8px;
  overflow: hidden;
}
.timer-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 1s linear;
}

.item-list { margin-bottom: 10px; }
.order-item {
  display: flex;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid #21262d;
  gap: 8px;
}
.order-item:last-child { border-bottom: none; }
.item-qty {
  background: #e94560;
  color: #fff;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: bold;
  flex-shrink: 0;
}
.item-name-kitchen { font-size: 15px; flex: 1; }
.item-note { font-size: 11px; color: #f5a623; margin-top: 2px; }

.done-btn {
  width: 100%;
  padding: 10px;
  background: linear-gradient(135deg, #27ae60, #1e8449);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
}
.urgent-btn {
  width: 100%;
  padding: 8px;
  background: linear-gradient(135deg, #f5a623, #d68910);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  margin-bottom: 6px;
}

.empty-msg {
  text-align: center;
  color: #444;
  padding: 40px 20px;
  font-size: 14px;
}

/* 完成通知 */
.toast {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: #27ae60;
  color: #fff;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: bold;
  display: none;
  z-index: 999;
  animation: fadeIn 0.3s;
}
@keyframes fadeIn { from{opacity:0;top:60px} to{opacity:1;top:70px} }
</style>
</head>
<body>

<div class="header">
  <span class="back-btn" onclick="location.href='/'">←</span>
  <h1>🍳 厨房看板 / Küche</h1>
  <span class="clock" id="clock"></span>
</div>

<div class="toast" id="toast"></div>

<div class="columns">
  <div class="col col-starters">
    <div class="col-header">前菜 / Vorspeisen</div>
    <div id="starters-list"></div>
  </div>
  <div class="col col-mains">
    <div class="col-header">主食/拉面 / Hauptgerichte</div>
    <div id="mains-list"></div>
  </div>
</div>

<!-- 音效 -->
<audio id="sound-new" preload="auto">
  <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAA..." type="audio/wav">
</audio>

<script>
const socket = io();
let orders = [];
let orderTimes = {};

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN');
}
setInterval(updateClock, 1000);
updateClock();

function playSound(type) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  
  if (type === 'new') {
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
    osc.frequency.setValueAtTime(880, ctx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.5);
  } else if (type === 'done') {
    osc.frequency.setValueAtTime(660, ctx.currentTime);
    osc.frequency.setValueAtTime(880, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
  } else if (type === 'urgent') {
    [0, 0.15, 0.3].forEach(t => {
      const o2 = ctx.createOscillator();
      const g2 = ctx.createGain();
      o2.connect(g2); g2.connect(ctx.destination);
      o2.frequency.value = 1320;
      g2.gain.setValueAtTime(0.4, ctx.currentTime + t);
      g2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + t + 0.1);
      o2.start(ctx.currentTime + t);
      o2.stop(ctx.currentTime + t + 0.1);
    });
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

function getElapsed(createdAt) {
  const created = new Date(createdAt.replace(' ', 'T'));
  const elapsed = Math.floor((Date.now() - created.getTime()) / 1000);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;
  return { elapsed, text: `${mins}:${secs.toString().padStart(2, '0')}` };
}

function getTimerColor(elapsed) {
  if (elapsed < 300) return '#2ecc71';
  if (elapsed < 600) return '#f5a623';
  return '#e94560';
}

function renderOrders(orderList) {
  const startersList = document.getElementById('starters-list');
  const mainsList = document.getElementById('mains-list');
  startersList.innerHTML = '';
  mainsList.innerHTML = '';

  // 按桌号合并同类菜
  const byTable = {};
  orderList.forEach(o => {
    const items = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
    const kitchenItems = items.filter(i => ['starters', 'mains'].includes(getCat(i)));
    if (kitchenItems.length === 0) return;
    
    if (!byTable[o.table_name]) {
      byTable[o.table_name] = { ...o, kitchenItems: [] };
    }
    kitchenItems.forEach(item => {
      const existing = byTable[o.table_name].kitchenItems.find(e => e.name === item.name);
      if (existing) existing.qty += item.qty;
      else byTable[o.table_name].kitchenItems.push({ ...item });
    });
  });

  const tables = Object.values(byTable);
  if (tables.length === 0) {
    startersList.innerHTML = '<div class="empty-msg">暂无订单<br>Keine Bestellungen</div>';
    mainsList.innerHTML = '<div class="empty-msg">暂无订单<br>Keine Bestellungen</div>';
    return;
  }

  tables.forEach(t => {
    const starters = t.kitchenItems.filter(i => getCat(i) === 'starters');
    const mains = t.kitchenItems.filter(i => getCat(i) === 'mains');
    const { elapsed, text } = getElapsed(t.created_at);
    const color = getTimerColor(elapsed);
    const pct = Math.min((elapsed / 900) * 100, 100);

    [
      { items: starters, container: startersList },
      { items: mains, container: mainsList }
    ].forEach(({ items, container }) => {
      if (items.length === 0) return;
      const card = document.createElement('div');
      card.className = 'order-card';
      card.innerHTML = `
        <div class="card-header">
          <span class="table-badge">🪑 ${t.table_name}</span>
          <span class="time-badge" id="time-${t.table_name}">${text}</span>
        </div>
        <div class="timer-bar">
          <div class="timer-fill" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="item-list">
          ${items.map(i => `
            <div class="order-item">
              <span class="item-qty">${i.qty}</span>
              <div>
                <div class="item-name-kitchen">${i.name}</div>
                ${i.note ? `<div class="item-note">📝 ${i.note}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
        <button class="urgent-btn" onclick="urgentAlert('${t.table_name}')">⚡ 加急 / Eilig</button>
        <button class="done-btn" onclick="markDone(${t.id}, '${t.table_name}')">✅ 制作完成 / Fertig</button>
      `;
      container.appendChild(card);
    });
  });
}

function getCat(item) {
  // 根据名字判断类别（简单逻辑）
  const starterNames = ['毛豆','饺子','炸鸡翅','前菜'];
  if (starterNames.some(s => item.name.includes(s))) return 'starters';
  if (item.name.includes('拉面') || item.name.includes('加蛋') || item.name.includes('叉烧') || item.name.includes('葱')) return 'mains';
  return item.category || 'mains';
}

function urgentAlert(tableName) {
  playSound('urgent');
  showToast(`⚡ 加急催单：${tableName}！`);
}

async function markDone(orderId, tableName) {
  await fetch(`/api/order/${orderId}/complete`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({type: 'kitchen'})
  });
  playSound('done');
  showToast(`✅ ${tableName} 菜品已出！`);
  loadOrders();
}

async function loadOrders() {
  const res = await fetch('/api/kitchen/orders');
  orders = await res.json();
  renderOrders(orders);
}

socket.on('new_order', (data) => {
  playSound('new');
  showToast(`🆕 新订单：${data.table_name}`);
  loadOrders();
});
socket.on('order_updated', loadOrders);

loadOrders();
setInterval(loadOrders, 20000);
// 更新计时器
setInterval(() => {
  orders.forEach(o => {
    const el = document.getElementById(`time-${o.table_name}`);
    if (el) el.textContent = getElapsed(o.created_at).text;
  });
}, 1000);
</script>
</body>
</html>
