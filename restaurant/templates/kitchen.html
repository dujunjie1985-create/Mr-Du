<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>厨房看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'PingFang SC',sans-serif; background:#0d1117; color:#fff; min-height:100vh; }
.header { background:#161b22; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #e94560; position:sticky; top:0; z-index:50; }
.header h1 { font-size:17px; color:#e94560; }
.header-right { display:flex; align-items:center; gap:8px; }
.clock { font-size:13px; color:#888; }
.history-btn { padding:6px 12px; background:#333; color:#fff; border:none; border-radius:8px; font-size:12px; cursor:pointer; }
.back-btn { font-size:20px; cursor:pointer; color:#888; }
.columns { display:grid; grid-template-columns:1fr 1fr; height:calc(100vh - 52px); }
.col { border-right:1px solid #21262d; overflow-y:auto; }
.col-header { padding:10px 12px; font-size:13px; font-weight:bold; text-align:center; position:sticky; top:0; z-index:10; }
.col-starters .col-header { background:#1a2e1a; color:#2ecc71; border-bottom:2px solid #2ecc71; }
.col-mains .col-header { background:#2e1a1a; color:#e94560; border-bottom:2px solid #e94560; }
.order-card { margin:6px; border-radius:10px; padding:10px 12px; border:1px solid #333; background:#161b22; animation:slideIn 0.3s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse { 0%,100%{border-color:#e94560;box-shadow:0 0 8px #e94560;} 50%{border-color:#ff6b6b;box-shadow:0 0 20px #e94560;} }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.table-badge { background:#e94560; color:#fff; padding:5px 14px; border-radius:20px; font-size:18px; font-weight:bold; }
.time-badge { font-size:11px; color:#888; }
.timer-bar { height:3px; background:#21262d; border-radius:2px; margin-bottom:6px; overflow:hidden; }
.timer-fill { height:100%; border-radius:2px; transition:width 1s linear; }
.order-item { display:flex; align-items:center; padding:8px 0; border-bottom:1px solid #21262d; gap:8px; font-size:22px; }
.order-item:last-child { border-bottom:none; }
.order-item.done-item { opacity:0.3; text-decoration:line-through; }
.item-qty { background:#e94560; color:#fff; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:bold; flex-shrink:0; }
.item-name { flex:1; }
.item-name-de { font-size:13px; color:#aaa; margin-top:2px; }
.item-check { width:26px; height:26px; border-radius:50%; border:none; background:#27ae60; color:#fff; cursor:pointer; font-size:14px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.item-check.done { background:#333; }
.item-note { font-size:11px; color:#f5a623; }
.card-actions { display:flex; gap:6px; margin-top:8px; }
.done-btn { flex:1; padding:8px; background:linear-gradient(135deg,#27ae60,#1e8449); color:#fff; border:none; border-radius:8px; font-size:12px; font-weight:bold; cursor:pointer; }
.urgent-btn { padding:8px 10px; background:#f5a623; color:#fff; border:none; border-radius:8px; font-size:12px; cursor:pointer; }
.empty-msg { text-align:center; color:#444; padding:40px 12px; font-size:13px; }
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:200; overflow-y:auto; }
.modal.open { display:block; }
.modal-content { background:#161b22; margin:16px; border-radius:16px; padding:16px; }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.modal-title { font-size:16px; font-weight:bold; color:#f5a623; }
.modal-close { font-size:22px; cursor:pointer; color:#888; }
.history-item { background:#1a1a2e; border-radius:8px; padding:10px 12px; margin-bottom:8px; border-left:3px solid #27ae60; cursor:pointer; }
.history-item:hover { border-color:#f5a623; }
.restore-btn { padding:4px 10px; background:#e94560; color:#fff; border:none; border-radius:6px; font-size:11px; cursor:pointer; float:right; }
.toast { position:fixed; top:60px; left:50%; transform:translateX(-50%); color:#fff; padding:12px 24px; border-radius:10px; font-size:15px; font-weight:bold; display:none; z-index:999; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,0.5); }
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="back-btn" onclick="location.href='/'">←</span>
    <h1>🍳 厨房 / Küche</h1>
  </div>
  <div class="header-right">
    <span class="clock" id="clock"></span>
    <button class="history-btn" id="sound-btn" onclick="enableSound()" style="background:#e94560;">🔇 开启声音</button>
    <button class="history-btn" onclick="openHistory()">📋 已出菜</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="columns">
  <div class="col col-starters">
    <div class="col-header">🥗 前菜 / Vorspeisen</div>
    <div id="starters-list"></div>
  </div>
  <div class="col col-mains">
    <div class="col-header">🍜 主食 / Hauptgerichte</div>
    <div id="mains-list"></div>
  </div>
</div>
<div class="modal" id="history-modal">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title">📋 已出菜记录（20分钟内可恢复）</span>
      <span class="modal-close" onclick="closeHistory()">✕</span>
    </div>
    <div id="history-list"></div>
  </div>
</div>
<script>
const socket = io();
let pendingOrders = [];
let doneOrders = [];
const doneOrderIds = new Set(); // 记录已完成的 orderId-cid 组合

function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('de-DE'); }
setInterval(updateClock, 1000); updateClock();

let audioEnabled = false;
let audioCtx = null;

function enableSound() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // 播放一个短暂的测试音
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    audioEnabled = true;
    const btn = document.getElementById('sound-btn');
    btn.textContent = '🔊 声音已开';
    btn.style.background = '#27ae60';
  } catch(e) {
    alert('无法开启声音，请检查设备设置');
  }
}

function playSound(type) {
  if (!audioEnabled || !audioCtx) return;
  try {
    if (type === 'new') {
      const times = [0, 0.35, 0.7];
      times.forEach(startTime => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(1046, audioCtx.currentTime + startTime);
        osc.frequency.setValueAtTime(1318, audioCtx.currentTime + startTime + 0.1);
        osc.frequency.setValueAtTime(1568, audioCtx.currentTime + startTime + 0.2);
        gain.gain.setValueAtTime(1.0, audioCtx.currentTime + startTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + startTime + 0.28);
        osc.start(audioCtx.currentTime + startTime);
        osc.stop(audioCtx.currentTime + startTime + 0.28);
      });
    } else if (type === 'urgent') {
      [0,0.12,0.24,0.36,0.48].forEach(t => {
        const o2 = audioCtx.createOscillator(); const g2 = audioCtx.createGain();
        o2.connect(g2); g2.connect(audioCtx.destination);
        o2.frequency.value = 1760;
        g2.gain.setValueAtTime(1.0, audioCtx.currentTime+t);
        g2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+t+0.1);
        o2.start(audioCtx.currentTime+t); o2.stop(audioCtx.currentTime+t+0.1);
      });
    } else if (type === 'done') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(660, audioCtx.currentTime);
      osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }
  } catch(e) {}
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color||'#27ae60'; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function getElapsed(createdAt) {
  const created = new Date(createdAt.replace(' ','T'));
  const elapsed = Math.floor((Date.now() - created.getTime()) / 1000);
  return { elapsed, text: Math.floor(elapsed/60)+':'+(elapsed%60).toString().padStart(2,'0') };
}

function getTimerColor(elapsed) {
  if (elapsed < 600) return '#2ecc71';   // 0-10分钟 绿色
  if (elapsed < 1200) return '#f5a623';  // 10-20分钟 橙色
  return '#e94560';                       // 20分钟以上 红色
}

const DRINKS = ['啤酒','葡萄酒','鸡尾酒','威士忌','咖啡','矿泉水','可乐','柠檬水','冰茶','清酒','伏特加','朗姆','龙舌兰','浓缩','卡布','拿铁','美式','红茶','绿茶','苏打','椰子','果汁','卡尔','柚子','芦荟','汤力','生啤','起泡','玫瑰','霞多','茨威','威特','beer','wine','cocktail','whisky','coffee','soft','sake','espresso','latte','tee','tea','juice','wasser','soda','calpis','yuzuka','spritzer','martini','negroni','campari','aperol','lillet','tonic'];
const STARTERS = ['毛豆','黄瓜','妈妈','泡菜','裙带','味噌','东阴','炸豆腐','春卷','小笼','饺子','天妇罗','章鱼烧','炸鸡','照烧鸡','沙拉','edamame','cucumber','kimchi','wakame','miso','tom yum','agedashi','gyoza','tempura','takoyaki','karaage','fried chicken','spring roll','meat bun','salat','gurkensalat'];

function isDrink(item) {
  if (item.category === 'drinks') return true;
  const n = (item.name+' '+(item.name_de||'')).toLowerCase();
  return DRINKS.some(k => n.includes(k));
}
function isStarter(item) {
  if (item.category === 'starters') return true;
  const n = (item.name+' '+(item.name_de||'')).toLowerCase();
  return STARTERS.some(k => n.includes(k));
}

// 追踪每张卡里哪些菜已完成
const itemsDone = {}; // key: `${orderId}-${cid}-${itemName}`

function renderOrders(orders) {
  const sL = document.getElementById('starters-list');
  const mL = document.getElementById('mains-list');
  sL.innerHTML = ''; mL.innerHTML = '';

  const byTable = {};
  orders.forEach(o => {
    const items = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
    const foodItems = items.filter(i => !isDrink(i));
    if (foodItems.length === 0) return;
    if (!byTable[o.table_name]) byTable[o.table_name] = {...o, starterItems:[], mainItems:[]};
    foodItems.forEach(item => {
      if (isStarter(item)) {
        const ex = byTable[o.table_name].starterItems.find(e => e.name===item.name);
        if (ex) ex.qty += item.qty; else byTable[o.table_name].starterItems.push({...item});
      } else {
        const ex = byTable[o.table_name].mainItems.find(e => e.name===item.name);
        if (ex) ex.qty += item.qty; else byTable[o.table_name].mainItems.push({...item});
      }
    });
  });

  let hasS=false, hasM=false;
  kitchenOrders = Object.values(byTable);
  kitchenOrders.sort((a,b) => new Date(b.created_at)-new Date(a.created_at));

  kitchenOrders.forEach(t => {
    const {elapsed,text} = getElapsed(t.created_at);
    const color = getTimerColor(elapsed);
    const pct = Math.min((elapsed/900)*100,100);

    const makeCard = (items, container, cid) => {
      if (items.length === 0) return;
      // 如果这一侧已确认完成，跳过不显示
      if (doneOrderIds.has(`${t.id}-${cid}`)) return;
      const card = document.createElement('div');
      card.className = 'order-card';
      card.id = `card-${t.id}-${cid}`;

      const itemsHtml = items.map(i => {
        const key = `${t.id}-${cid}-${i.name}`;
        const done = itemsDone[key];
        return `
          <div class="order-item${done?' done-item':''}" id="item-row-${key.replace(/\s/g,'_')}">
            <span class="item-qty">${i.qty}</span>
            <div class="item-name">
              <div style="font-size:20px;font-weight:bold;">${i.name}</div>
              <div class="item-name-de">${i.name_de || ''}</div>
              ${i.note ? `<div class="item-note">📝 ${i.note}</div>` : ''}
              ${i.notes ? `<div class="item-note">📝 ${i.notes}</div>` : ''}
            </div>
            <button class="item-check${done?' done':''}" onclick="toggleItem('${key}','${t.id}','${cid}')" title="单独完成">
              ${done ? '↩' : '✓'}
            </button>
          </div>`;
      }).join('');

      card.innerHTML = `
        <div class="card-header">
          <span class="table-badge">🪑 ${t.table_name}</span>
          <span class="time-badge" id="tm-${t.id}-${cid}">${text}</span>
        </div>
        <div class="timer-bar"><div class="timer-fill" id="bar-${t.id}-${cid}" style="width:${pct}%;background:${color}"></div></div>
        ${t.notes ? `<div style="background:#2d2000;padding:6px 10px;border-radius:6px;margin-bottom:6px;font-size:12px;color:#f5a623;">📋 ${t.notes}</div>` : ''}
        <div id="items-${t.id}-${cid}">${itemsHtml}</div>
        <div class="card-actions">
          <button class="urgent-btn" onclick="urgentAlert('${t.table_name}')">⚡ Eilig</button>
          <button class="done-btn" onclick="markAllDone('${t.id}','${t.table_name}','${cid}')">✅ 全部完成 / Alle fertig</button>
        </div>`;
      container.appendChild(card);
    };

    if (t.starterItems.length > 0 && !sectionDone[t.id]?.s) { makeCard(t.starterItems, sL, 's'); hasS=true; }
    if (t.mainItems.length > 0 && !sectionDone[t.id]?.m) { makeCard(t.mainItems, mL, 'm'); hasM=true; }
  });

  if (!hasS) sL.innerHTML = '<div class="empty-msg">✅ 暂无待出前菜<br>Keine Vorspeisen</div>';
  if (!hasM) mL.innerHTML = '<div class="empty-msg">✅ 暂无待出主食<br>Keine Hauptgerichte</div>';
}

let kitchenOrders = [];

function toggleItem(key, orderId, cid) {
  if (itemsDone[key]) {
    delete itemsDone[key];
  } else {
    itemsDone[key] = true;
  }
  // 更新该行样式
  const safeKey = key.replace(/\s/g,'_');
  const row = document.getElementById(`item-row-${safeKey}`);
  if (row) {
    row.className = `order-item${itemsDone[key]?' done-item':''}`;
    const btn = row.querySelector('.item-check');
    if (btn) { btn.className = `item-check${itemsDone[key]?' done':''}`; btn.textContent = itemsDone[key]?'↩':'✓'; }
  }
  playSound('done');
}

// 记录哪些订单的哪个部分已完成
const sectionDone = {}; // key: orderId, value: {s: bool, m: bool}

async function markAllDone(orderId, tableName, cid) {
  // 记录到本地，防止刷新后重新出现
  doneOrderIds.add(`${orderId}-${cid}`);
  
  const card = document.getElementById(`card-${orderId}-${cid}`);
  if (card) {
    card.style.opacity='0'; card.style.transition='opacity 0.3s';
    setTimeout(()=>card.remove(),300);
  }
  const label = cid==='s'?'前菜':'主食';
  showToast(`✅ ${tableName} ${label}全部出菜！`, '#27ae60');
  playSound('done');
  doneOrders.unshift({
    id: orderId, table: tableName, section: label,
    time: new Date().toLocaleTimeString('de-DE'),
    timestamp: Date.now(), cid
  });
  Object.keys(itemsDone).forEach(k => { if (k.startsWith(`${orderId}-${cid}`)) delete itemsDone[k]; });

  // 记录该部分已完成
  if (!sectionDone[orderId]) sectionDone[orderId] = {};
  sectionDone[orderId][cid] = true;

  // 通知后端
  await fetch(`/api/order/${orderId}/complete`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({type:'kitchen'})
  });
}

function urgentAlert(tableName) {
  playSound('urgent');
  showToast(`⚡ 加急：${tableName}！`, '#f5a623');
}

function openHistory() {
  const list = document.getElementById('history-list');
  const now = Date.now();
  const recent = doneOrders.filter(o => (now - o.timestamp) < 20*60*1000);
  
  if (recent.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#444;padding:40px">暂无已出菜记录</div>';
  } else {
    list.innerHTML = recent.map((o,idx) => {
      const mins = Math.floor((now - o.timestamp)/60000);
      const canRestore = mins < 20;
      return `
        <div class="history-item">
          <div style="display:flex;justify-content:space-between;font-size:13px;align-items:center;">
            <span style="color:#27ae60;font-weight:bold;">🪑 ${o.table} — ${o.section}</span>
            ${canRestore ? `<button class="restore-btn" onclick="restoreOrder(${idx})">↩ 恢复</button>` : ''}
          </div>
          <div style="color:#888;font-size:12px;margin-top:4px;">✅ ${o.time}（${mins}分钟前）</div>
        </div>`;
    }).join('');
  }
  document.getElementById('history-modal').classList.add('open');
}

function restoreOrder(idx) {
  // 恢复：重新加载订单
  doneOrders.splice(idx, 1);
  closeHistory();
  loadOrders();
  showToast('↩ 已恢复！', '#f5a623');
}

function closeHistory() { document.getElementById('history-modal').classList.remove('open'); }

setInterval(() => {
  if (!kitchenOrders) return;
  kitchenOrders.forEach(o => {
    const {elapsed,text} = getElapsed(o.created_at);
    const color = getTimerColor(elapsed);
    const pct = Math.min((elapsed/1800)*100,100);
    ['s','m'].forEach(cid => {
      const tm = document.getElementById(`tm-${o.id}-${cid}`);
      const bar = document.getElementById(`bar-${o.id}-${cid}`);
      const card = document.getElementById(`card-${o.id}-${cid}`);
      if (tm) tm.textContent = text;
      if (bar) { bar.style.width=pct+'%'; bar.style.background=color; }
      // 20分钟以上 卡片边框闪烁红色
      if (card) {
        if (elapsed >= 1200) {
          card.style.border = '2px solid #e94560';
          card.style.animation = 'pulse 1s infinite';
        } else if (elapsed >= 600) {
          card.style.border = '1px solid #f5a623';
          card.style.animation = '';
        } else {
          card.style.border = '1px solid #333';
          card.style.animation = '';
        }
      }
    });
  });
  // 20分钟超时声音提醒（每分钟一次）
  if (kitchenOrders.some(o => getElapsed(o.created_at).elapsed >= 1200)) {
    const now = Date.now();
    if (!window.lastWarning || now - window.lastWarning > 60000) {
      window.lastWarning = now;
      playSound('urgent');
      showToast('⚠️ 有订单超过20分钟！', '#e94560');
    }
  }
}, 1000);

socket.on('new_order', data => {
  playSound('new');
  showToast(`🆕 新订单：${data.table_name}`, '#e94560');
  loadOrders();
});
socket.on('order_updated', data => {
  // 其他设备收到广播后重新加载
  loadOrders();
});

async function loadOrders() {
  const res = await fetch('/api/kitchen/orders');
  const allOrders = await res.json();
  pendingOrders = allOrders;
  renderOrders(pendingOrders);
}

loadOrders();
setInterval(loadOrders, 5000);
</script>
</body>
</html>
