<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>员工登录二维码</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'PingFang SC',sans-serif; background:#1a1a2e; color:#fff; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
.box { background:#16213e; border-radius:20px; padding:32px; text-align:center; max-width:400px; width:100%; border:1px solid #30363d; }
h1 { color:#e94560; font-size:22px; margin-bottom:8px; }
p { color:#888; font-size:14px; margin-bottom:24px; }
#qrcode { display:inline-block; background:#fff; padding:16px; border-radius:12px; margin-bottom:20px; }
.url-box { background:#0d1117; border:1px solid #333; border-radius:10px; padding:12px; font-size:13px; color:#4a90e2; word-break:break-all; margin-bottom:16px; }
.hint { font-size:13px; color:#f5a623; margin-top:8px; }
.back-btn { display:block; margin-top:20px; padding:12px 24px; background:#333; color:#fff; border:none; border-radius:10px; font-size:14px; cursor:pointer; text-decoration:none; }
</style>
</head>
<body>
<div class="box">
  <h1>🍜 Mr. Du Ramen</h1>
  <p>员工登录二维码 / Mitarbeiter QR-Code</p>
  <div id="qrcode"></div>
  <div class="url-box" id="url-display"></div>
  <div class="hint">扫码后输入员工密码登录<br>Nach dem Scannen Mitarbeiterpasswort eingeben</div>
  <a class="back-btn" href="/admin">← 返回管理</a>
</div>
<script>
const loginUrl = window.location.origin + '/login';
document.getElementById('url-display').textContent = loginUrl;
new QRCode(document.getElementById('qrcode'), {
  text: loginUrl,
  width: 200,
  height: 200,
  colorDark: '#000000',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.H
});
</script>
</body>
</html>
