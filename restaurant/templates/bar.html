<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>吧台看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'PingFang SC', sans-serif; background:#0d1117; color:#fff; min-height:100vh; }
.header { background:#161b22; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #f5a623; }
.header h1 { font-size:20px; color:#f5a623; }
.back-btn { font-size:22px; cursor:pointer; color:#888; }
.clock { font-size:14px; color:#888; }

.orders-grid { padding: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }

.bar-card { background:#161b22; border-radius:12px; padding:14px; border:1px solid #333; }
.bar-card.has-pending { border-color:#e94560; }
.card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.table-badge { background:#f5a623; color:#000; padding:4px 12px; border-radius:20px; font-size:13px; font-weight:bold; }
.pending-count { background:#e94560; color:#fff; padding:4px 10px; border-radius:20px; font-size:13px; font-weight:bold; }

.drink-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #21262d; }
.drink-item:last-child { border-bottom:none; }
.drink-qty { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:bold; flex-shrink:0; }
.drink-qty.pending { background:#e94560; color:#fff; }
.drink-qty.done { background:#27ae60; color:#fff; }
.drink-name { flex:1; font-size:14px; }
.drink-name.done-text { color:#444; text-decoration:line-through; }
.done-item-btn { padding:4px 10px; background:#27ae60; color:#fff; border:none; border-radius:6px; font-size:12px; cursor:pointer; }

.complete-btn { width:100%; padding:10px; background:linear-gradient(135deg,#f5a623,#d68910); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:bold; cursor:pointer; margin-top:10px; }

.empty-msg { text-align:center; color:#444; padding:60px 20px; font-size:16px; }

.toast { position:fixed; top:70px; left:50%; transform:translateX(-50%); background:#f5a623; color:#000; padding:12px 24px; border-radius:10px; font-size:15px; font-weight:bold; display:none; z-index:999; }
</style>
</head>
<body>
<div class="header">
  <span class="back-btn" onclick="location.href='/'">←</span>
  <h1>🍸 吧台看板 / Bar</h1>
  <span class="clock" id="clock"></span>
</div>
<div class="toast" id="toast"></div>
<div class="orders-grid" id="orders-grid"></div>

<script>
const socket = io();

function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN'); }
setInterval(updateClock, 1000); updateClock();

function playSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.setValueAtTime(880, ctx.currentTime);
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
  osc.start(); osc.stop(ctx.currentTime + 0.4);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

async function loadOrders() {
  const res = await fetch('/api/bar/orders');
  const orders = await res.json();
  renderOrders(orders);
}

function renderOrders(orders) {
  const grid = document.getElementById('orders-grid');
  
  // 按桌号合并酒水
  const byTable = {};
  orders.forEach(o => {
    const items = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
    const drinks = items.filter(i => i.category === 'drinks' || isDrink(i.name));
    if (drinks.length === 0) return;
    if (!byTable[o.table_name]) byTable[o.table_name] = { orderId: o.id, table: o.table_name, drinks: [], doneItems: new Set() };
    drinks.forEach(d => {
      const ex = byTable[o.table_name].drinks.find(e => e.name === d.name);
      if (ex) ex.qty += d.qty;
      else byTable[o.table_name].drinks.push({ ...d, status: 'pending' });
    });
  });

  const tables = Object.values(byTable);
  if (tables.length === 0) {
    grid.innerHTML = '<div class="empty-msg">🍸 暂无酒水订单<br>Keine Getränkebestellungen</div>';
    return;
  }

  grid.innerHTML = '';
  tables.forEach(t => {
    const pendingCount = t.drinks.filter(d => d.status === 'pending').length;
    const card = document.createElement('div');
    card.className = `bar-card ${pendingCount > 0 ? 'has-pending' : ''}`;
    card.innerHTML = `
      <div class="card-top">
        <span class="table-badge">🪑 ${t.table}</span>
        ${pendingCount > 0 ? `<span class="pending-count">未制作 ${pendingCount}</span>` : '<span style="color:#27ae60;font-size:13px">✅ 全部完成</span>'}
      </div>
      <div class="drink-list">
        ${t.drinks.map((d, idx) => `
          <div class="drink-item" id="drink-${t.table}-${idx}">
            <div class="drink-qty ${d.status}">${d.qty}</div>
            <div class="drink-name ${d.status === 'done' ? 'done-text' : ''}">${d.name}</div>
            ${d.status !== 'done' ? `<button class="done-item-btn" onclick="markDrinkDone('${t.table}', ${idx}, ${t.orderId})">完成</button>` : '✅'}
          </div>
        `).join('')}
      </div>
      ${pendingCount > 0 ? `<button class="complete-btn" onclick="markAllDone(${t.orderId}, '${t.table}')">✅ 全部完成 / Alle fertig</button>` : ''}
    `;
    grid.appendChild(card);
  });
}

function isDrink(name) {
  const drinks = ['啤酒','葡萄酒','清酒','威士忌','鸡尾酒','可乐','水','咖啡','柠檬水','饮料'];
  return drinks.some(d => name.includes(d));
}

function markDrinkDone(table, idx, orderId) {
  // 简单UI更新
  const el = document.getElementById(`drink-${table}-${idx}`);
  if (el) {
    el.querySelector('.drink-qty').className = 'drink-qty done';
    el.querySelector('.drink-name').className = 'drink-name done-text';
    const btn = el.querySelector('.done-item-btn');
    if (btn) btn.replaceWith(document.createTextNode('✅'));
  }
  playSound();
}

async function markAllDone(orderId, tableName) {
  await fetch(`/api/order/${orderId}/complete`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({type: 'bar'})
  });
  showToast(`✅ ${tableName} 酒水全部完成！`);
  loadOrders();
}

socket.on('new_order', (data) => { playSound(); showToast(`🆕 新酒水：${data.table_name}`); loadOrders(); });
socket.on('order_updated', loadOrders);

loadOrders();
setInterval(loadOrders, 15000);
</script>
</body>
</html>
